[phases.setup]
nixPkgs = ["node"]

[phases.build]
cmds = ["npm install -g pnpm && pnpm install && pnpm --filter @workspace/db run db:push && node artifacts/api-server/build.mjs"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"

[variables]
NODE_ENV = "production"
PORT = "5000"